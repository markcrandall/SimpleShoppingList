<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a90d9">
  <title>Shopping List</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Shopping List</h1>
  </header>

  <nav class="tab-bar">
    <a class="tab active" href="#trip" data-view="trip">Trip</a>
    <a class="tab" href="#lists" data-view="lists">Lists</a>
    <a class="tab" href="#items" data-view="items">Items</a>
  </nav>

  <main class="app-main">
    <div id="view-trip" class="view-container active"></div>
    <div id="view-lists" class="view-container"></div>
    <div id="view-items" class="view-container"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <div class="app-version">v11</div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
